<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Entrar - BioUrban</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #1e3d29; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 8px; box-sizing: border-box; }
        button { background: #3A7B50; color: white; width: 100%; padding: 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <!-- Alterado para LOGO.png -->
        <img src="{{ url_for('static', filename='images/LOGO.png') }}" alt="Logo" style="width: 200px; margin-bottom: 20px;">
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for m in messages %}
                    <p style="color: red; font-size: 0.8rem;">{{ m }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Usuário" required>
            <input type="password" name="password" placeholder="Senha" required>
            <button type="submit">Entrar no Sistema</button>
        </form>
        <p style="font-size: 0.9rem; margin-top: 20px;">Novo produtor? <a href="/register" style="color: #3A7B50;">Crie sua conta</a></p>
    </div>
</body>
</html>
